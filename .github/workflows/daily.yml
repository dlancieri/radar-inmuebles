name: Property Intelligence

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run radar
        run: python main.py

      - name: Upload database
        uses: actions/upload-artifact@v4
        with:
          name: properties-db
          path: properties.db

      - name: Upload oportunidades
        uses: actions/upload-artifact@v4
        with:
          name: oportunidades
          path: oportunidades.csv
