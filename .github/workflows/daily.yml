name: Test InfoCasas

on:
  workflow_dispatch:

jobs:
  test-infocasas:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run test
        run: python main.py

      - name: Upload debug
        uses: actions/upload-artifact@v4
        with:
          name: infocasas-debug
          path: |
            infocasas.png
            infocasas.html
